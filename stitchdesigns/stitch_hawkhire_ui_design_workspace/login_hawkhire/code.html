<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Simple button scaling effect
            const buttons = document.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.addEventListener('mousedown', () => {
                    btn.classList.add('scale-95');
                });
                btn.addEventListener('mouseup', () => {
                    btn.classList.remove('scale-95');
                });
                btn.addEventListener('mouseleave', () => {
                    btn.classList.remove('scale-95');
                });
            });

            // Password visibility toggle
            const togglePassword = document.querySelector('button .material-symbols-outlined');
            const passwordInput = document.getElementById('password');
            
            if(togglePassword) {
                togglePassword.parentElement.addEventListener('click', () => {
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    togglePassword.textContent = type === 'password' ? 'visibility' : 'visibility_off';
                });
            }
        });
    </script>
